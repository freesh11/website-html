<!DOCTYPE html>
<html>
<head>
  <title>Mini Proxy Browser</title>
  <style>
    body { margin:0; font-family:sans-serif; background:#111; color:white; }
    .bar {
      display:flex;
      padding:10px;
      gap:10px;
      background:#222;
    }
    input {
      flex:1;
      padding:8px;
    }
    iframe {
      width:100%;
      height:90vh;
      border:none;
    }
  </style>
</head>
<body>

<div class="bar">
  <input id="url" placeholder="Enter URL (https://example.com)">
  <button onclick="go()">Go</button>
</div>

<iframe id="frame"></iframe>

<script>
function go() {
  const url = document.getElementById("url").value;
  document.getElementById("frame").src =
    "https://YOUR-PROXY-BACKEND.com/proxy?url=" + encodeURIComponent(url);
}
</script>

</body>
</html>
