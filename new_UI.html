<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>&#x200B;</title>
<style>
:root{
  --task-opacity:0.08;
  --task:rgba(255,255,255,var(--task-opacity));
  --glass:rgba(255,255,255,0.12);
  --glass2:rgba(255,255,255,0.18);
  --accent:#00ff7f;
}
*{box-sizing:border-box;user-select:none}
body{
  margin:0;
  font-family:"Segoe UI",sans-serif;
  background:#1a1a1a;
  overflow:hidden;
  color:white;
}
#desktop{position:absolute;inset:0;padding:20px}

/* TASKBAR */
#taskbar{
  position:absolute;bottom:0;width:100%;height:60px;
  background:rgba(255,255,255,var(--task-opacity));
  backdrop-filter:blur(20px);
  display:flex;align-items:center;justify-content:center;z-index:9999;
  transition:background .3s;
}
#taskIcons{display:flex;gap:8px;align-items:center}
.taskBtn{
  width:44px;height:44px;display:flex;align-items:center;justify-content:center;
  border-radius:10px;cursor:pointer;background:rgba(255,255,255,0.05);font-size:18px;
  position:relative;
}
.taskBtn:hover{background:var(--glass2)}
.taskBtn:not(.taskBtn--start)::after{
  content:'';position:absolute;bottom:3px;left:50%;transform:translateX(-50%);
  width:6px;height:3px;border-radius:2px;
  background:rgba(255,255,255,0.35);
  transition:width .25s cubic-bezier(.34,1.56,.64,1), background .25s, box-shadow .25s;
}
.taskBtn.open::after{
  width:18px;
  background:var(--accent,#00d4ff);
  box-shadow:0 0 7px var(--accent,#00d4ff);
}

/* TASKBAR RIGHT ZONE */
#taskRight{
  position:absolute;right:0;top:0;bottom:0;
  display:flex;align-items:center;padding-right:4px;gap:2px;
}
.tray-icon{
  width:36px;height:44px;display:flex;align-items:center;justify-content:center;
  border-radius:8px;cursor:pointer;font-size:14px;transition:.15s;
}
.tray-icon:hover{background:var(--glass);}
#taskClock{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:0 10px;cursor:default;border-radius:8px;transition:.15s;
  line-height:1.3;height:44px;
}
#taskClock:hover{background:var(--glass);}
#clockTime{font-size:13px;font-weight:500;}
#clockDate{font-size:10px;opacity:.6;}
#showDesktop{
  width:6px;height:44px;border-left:1px solid rgba(255,255,255,0.12);
  cursor:pointer;transition:.15s;flex-shrink:0;border-radius:0 0 0 0;
}
#showDesktop:hover{background:rgba(255,255,255,0.18);}

/* SNAP OVERLAY */
#snapOverlay{
  position:fixed;inset:0 0 60px 0;
  background:rgba(0,212,255,0.06);border:2px solid rgba(0,212,255,0.25);
  border-radius:10px;pointer-events:none;opacity:0;
  transition:opacity .12s;z-index:9997;
}
#snapOverlay.show{opacity:1;}

/* TOAST */
#toastContainer{
  position:fixed;bottom:70px;right:16px;
  display:flex;flex-direction:column;gap:8px;
  z-index:999999;pointer-events:none;
}
.toast{
  background:rgba(22,22,22,0.94);backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.1);border-radius:10px;
  padding:10px 14px;font-size:12px;color:#fff;
  max-width:290px;box-shadow:0 8px 28px rgba(0,0,0,0.5);
  display:flex;align-items:center;gap:9px;
  animation:toastIn .22s ease forwards;
}
.toast.out{animation:toastOut .22s ease forwards;}
.toast-icon{font-size:16px;flex-shrink:0;}
.toast-body{display:flex;flex-direction:column;gap:1px;}
.toast-title{font-weight:600;font-size:12px;}
.toast-msg{font-size:11px;opacity:.7;}
.toast.success{border-left:3px solid #22c55e;}
.toast.info{border-left:3px solid var(--accent,#00d4ff);}
.toast.warn{border-left:3px solid #f59e0b;}
.toast.error{border-left:3px solid #ef4444;}
@keyframes toastIn{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}
@keyframes toastOut{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(16px)}}

/* SETTINGS PANEL */
.settings-root{
  flex:1;overflow-y:auto;padding:28px 32px;
  background:#111;display:flex;flex-direction:column;gap:24px;
}
.settings-section{display:flex;flex-direction:column;gap:12px;}
.settings-label{font-size:11px;letter-spacing:1px;opacity:.45;text-transform:uppercase;}
.settings-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.bg-preset{
  width:64px;height:40px;border-radius:8px;cursor:pointer;border:2px solid transparent;
  transition:.15s;flex-shrink:0;
}
.bg-preset.selected,.bg-preset:hover{border-color:var(--accent,#00d4ff);}
.accent-swatch{
  width:32px;height:32px;border-radius:50%;cursor:pointer;border:2px solid transparent;
  transition:.15s;flex-shrink:0;
}
.accent-swatch.selected,.accent-swatch:hover{border-color:#fff;transform:scale(1.15);}
.settings-divider{border:none;border-top:1px solid rgba(255,255,255,0.07);margin:0;}
.custom-bg-row{display:flex;gap:8px;align-items:center;}
.custom-bg-input{
  flex:1;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);
  border-radius:8px;padding:8px 12px;color:#fff;font-size:12px;outline:none;
}
.custom-bg-input:focus{border-color:var(--accent,#00d4ff);}
.settings-apply-btn{
  padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-size:12px;
  background:var(--accent,#00d4ff);color:#000;font-weight:600;transition:.15s;
}
.settings-apply-btn:hover{opacity:.85;}
.opacity-slider{
  -webkit-appearance:none;appearance:none;
  width:100%;height:4px;border-radius:2px;
  background:rgba(255,255,255,0.15);outline:none;cursor:pointer;
}
.opacity-slider::-webkit-slider-thumb{
  -webkit-appearance:none;appearance:none;
  width:16px;height:16px;border-radius:50%;
  background:var(--accent,#00d4ff);cursor:pointer;
  box-shadow:0 0 6px var(--accent,#00d4ff);
}
.opacity-label{font-size:12px;opacity:.7;min-width:36px;text-align:right;}

/* START MENU */
#start{
  position:absolute;bottom:80px;left:50%;
  transform:translateX(-50%) translateY(10px);
  width:560px;height:640px;
  background:rgba(18,18,18,0.55);backdrop-filter:blur(40px);
  border:1px solid rgba(255,255,255,0.08);border-radius:20px;
  padding:16px;display:flex;flex-direction:column;gap:12px;
  opacity:0;pointer-events:none;transition:.25s ease;z-index:99999;
}
#start.active{opacity:1;pointer-events:auto;transform:translateX(-50%) translateY(0);}
.startSearch{
  width:100%;padding:11px 12px;border-radius:12px;border:none;outline:none;
  background:rgba(255,255,255,0.06);color:white;font-size:13px;
}
.startSearch::placeholder{color:rgba(255,255,255,0.35);}
.startSectionTitle{font-size:11px;opacity:0.5;letter-spacing:1px;margin-top:4px;}
#pinnedGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;flex:1;}
.app{
  background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.06);
  border-radius:14px;padding:10px;font-size:12px;cursor:pointer;
  transition:.15s ease;display:flex;align-items:center;gap:8px;
}
.app:hover{background:rgba(255,255,255,0.12);transform:translateY(-2px);}
.app.hidden{display:none;}
#noResults{
  display:none;opacity:.45;font-size:13px;text-align:center;
  padding:20px 0;grid-column:1/-1;
}
.startBottom{
  display:flex;justify-content:space-between;align-items:center;
  padding-top:10px;border-top:1px solid rgba(255,255,255,0.08);
}
.userBox,.powerBox{
  padding:7px 10px;border-radius:10px;background:rgba(255,255,255,0.06);font-size:12px;
  cursor:pointer;transition:.15s;
}
.userBox:hover,.powerBox:hover{background:var(--glass2);}

/* WINDOW SYSTEM */
.window{
  position:absolute;width:900px;height:600px;background:#111;
  border-radius:12px;overflow:hidden;display:none;flex-direction:column;
  box-shadow:0 25px 70px rgba(0,0,0,0.6);
  transition:box-shadow .15s;
}
.window:focus-within{box-shadow:0 28px 80px rgba(0,0,0,0.75);}
.window.maximized{
  left:0!important;top:0!important;width:100vw!important;
  height:calc(100vh - 60px)!important;border-radius:0;
}
.window.maximized .resizeHandle{display:none}
.titlebar{
  height:38px;background:#1f1f1f;display:flex;justify-content:space-between;
  align-items:center;padding:0 10px;cursor:grab;flex-shrink:0;
  user-select:none;
}
.titlebar:active{cursor:grabbing;}
.controls span{margin-left:10px;cursor:pointer;opacity:.7;transition:.12s;}
.controls span:hover{opacity:1;}
.controls span.win-fs{font-size:14px;line-height:1}
iframe{flex:1;border:none;background:#000}
.resizeHandle{position:absolute;width:14px;height:14px;right:0;bottom:0;cursor:nwse-resize}

/* CONTEXT MENU */
#menu{
  position:absolute;display:none;background:#111;border:1px solid #333;
  border-radius:8px;min-width:180px;z-index:999999;overflow:hidden;
  box-shadow:0 8px 32px rgba(0,0,0,0.6);
}
#menu div{padding:9px 14px;cursor:pointer;font-size:13px;}
#menu div:hover{background:#222}
#menu hr{border:none;border-top:1px solid rgba(255,255,255,0.08);margin:3px 0;}

/* TASKBAR RIGHT-CLICK MENU */
#tbMenu{
  position:absolute;display:none;background:#111;border:1px solid #333;
  border-radius:8px;min-width:140px;z-index:9999999;overflow:hidden;
  box-shadow:0 8px 32px rgba(0,0,0,0.6);
}
#tbMenu div{padding:8px 14px;cursor:pointer;font-size:12px;}
#tbMenu div:hover{background:#222}

/* CMD */
.cmdBody{
  flex:1;background:#000;color:var(--accent);
  font-family:monospace;padding:10px;overflow:auto;
}
.cmdInput{
  width:100%;background:black;color:var(--accent);border:none;outline:none;
  font-family:monospace;padding:5px;flex-shrink:0;
  border-top:1px solid rgba(255,255,255,0.06);
}

/* NOTEPAD */
.notepad-toolbar{
  display:flex;gap:4px;padding:5px 8px;background:#1a1a1a;
  border-bottom:1px solid rgba(255,255,255,0.07);flex-shrink:0;
  align-items:center;flex-wrap:wrap;
}
.np-btn{
  padding:3px 10px;border-radius:5px;border:none;cursor:pointer;font-size:11px;
  background:rgba(255,255,255,0.07);color:#fff;transition:.15s;
}
.np-btn:hover{background:rgba(255,255,255,0.15);}
.np-sep{width:1px;height:18px;background:rgba(255,255,255,0.1);margin:0 2px;}
.np-select{
  background:rgba(255,255,255,0.07);color:#fff;border:none;border-radius:5px;
  font-size:11px;padding:3px 6px;outline:none;cursor:pointer;
}
.notepad-area{
  flex:1;background:#0d0d0d;color:#e2e8f0;border:none;outline:none;
  padding:16px;font-family:monospace;font-size:13px;resize:none;line-height:1.6;
}
.notepad-statusbar{
  height:22px;background:#141414;border-top:1px solid rgba(255,255,255,0.07);
  display:flex;align-items:center;padding:0 10px;font-size:10px;opacity:.5;
  flex-shrink:0;gap:16px;
}

/* ===== TASK MANAGER ===== */
.tm-root{
  flex:1;overflow:hidden;display:flex;flex-direction:column;
  background:#0d0d0d;font-family:"Segoe UI",sans-serif;
}
.tm-tabs{
  display:flex;gap:0;border-bottom:1px solid rgba(255,255,255,0.08);
  background:#141414;flex-shrink:0;
}
.tm-tab{
  padding:10px 20px;font-size:12px;cursor:pointer;color:rgba(255,255,255,0.5);
  border-bottom:2px solid transparent;transition:.15s;
}
.tm-tab.active{color:#fff;border-bottom-color:#00d4ff;}
.tm-tab:hover:not(.active){color:rgba(255,255,255,0.8);}
.tm-panel{display:none;flex:1;overflow:hidden;}
.tm-panel.active{display:flex;flex-direction:column;}

/* Performance panel */
.perf-layout{display:flex;flex:1;overflow:hidden;}
.perf-sidebar{
  width:200px;flex-shrink:0;border-right:1px solid rgba(255,255,255,0.06);
  overflow-y:auto;padding:8px 0;
}
.perf-sidebar-item{
  padding:10px 14px;cursor:pointer;transition:.12s;
  border-left:3px solid transparent;
}
.perf-sidebar-item.active{
  background:rgba(0,212,255,0.08);border-left-color:#00d4ff;
}
.perf-sidebar-item:hover:not(.active){background:rgba(255,255,255,0.04);}
.perf-sidebar-label{font-size:11px;color:rgba(255,255,255,0.5);margin-bottom:2px;}
.perf-sidebar-value{font-size:13px;font-weight:500;}
.perf-sidebar-mini{
  height:36px;border-radius:4px;overflow:hidden;margin-top:6px;
  background:rgba(255,255,255,0.04);position:relative;
}
.perf-content{flex:1;padding:20px;overflow-y:auto;display:flex;flex-direction:column;gap:16px;}
.perf-header{display:flex;justify-content:space-between;align-items:baseline;}
.perf-title{font-size:16px;font-weight:500;}
.perf-subtitle{font-size:12px;color:rgba(255,255,255,0.4);}
.perf-stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.perf-stat{background:rgba(255,255,255,0.04);border-radius:8px;padding:12px;}
.perf-stat-label{font-size:10px;color:rgba(255,255,255,0.4);letter-spacing:.5px;text-transform:uppercase;margin-bottom:4px;}
.perf-stat-val{font-size:18px;font-weight:500;}
.chart-wrap{background:rgba(255,255,255,0.03);border-radius:8px;padding:14px;position:relative;}
.chart-label{font-size:11px;color:rgba(255,255,255,0.4);margin-bottom:8px;display:flex;justify-content:space-between;}
canvas.sparkline{width:100%!important;display:block;}

/* Processes panel */
.proc-table{width:100%;border-collapse:collapse;font-size:12px;}
.proc-table th{
  background:#141414;padding:8px 12px;text-align:left;
  font-size:11px;color:rgba(255,255,255,0.4);font-weight:400;
  border-bottom:1px solid rgba(255,255,255,0.08);position:sticky;top:0;z-index:2;
  letter-spacing:.5px;text-transform:uppercase;cursor:pointer;
}
.proc-table th:hover{color:rgba(255,255,255,0.7);}
.proc-table td{padding:7px 12px;border-bottom:1px solid rgba(255,255,255,0.04);}
.proc-table tr:hover td{background:rgba(255,255,255,0.04);}
.proc-name{display:flex;align-items:center;gap:8px;}
.proc-icon{width:16px;height:16px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:11px;}
.bar-cell{width:100px;}
.mini-bar{height:4px;border-radius:2px;background:rgba(255,255,255,0.08);overflow:hidden;}
.mini-bar-fill{height:100%;border-radius:2px;transition:width .4s;}
.proc-scroll{flex:1;overflow-y:auto;}
.end-btn{
  background:rgba(255,60,60,0.15);color:rgba(255,100,100,0.9);
  border:none;border-radius:4px;padding:3px 8px;font-size:11px;cursor:pointer;
}
.end-btn:hover{background:rgba(255,60,60,0.3);}

/* KEYBOARD SHORTCUT HINT */
#kbHint{
  position:fixed;bottom:70px;left:50%;transform:translateX(-50%);
  background:rgba(22,22,22,0.9);border:1px solid rgba(255,255,255,0.1);
  border-radius:10px;padding:8px 16px;font-size:11px;opacity:0;
  pointer-events:none;transition:opacity .2s;z-index:999999;
  white-space:nowrap;
}
#kbHint.show{opacity:1;}
</style>
</head>
<body>

<div id="desktop"></div>
<div id="snapOverlay"></div>
<div id="toastContainer"></div>
<div id="kbHint"></div>

<!-- START -->
<div id="start">
  <input class="startSearch" id="startSearchInput" placeholder="🔍  Search apps..." autocomplete="off" />
  <div class="startSectionTitle" id="pinnedLabel">Pinned</div>
  <div id="pinnedGrid">
    <div class="app" data-name="FNAF 1" onclick="openGame(atob('aHR0cHM6Ly9pcnY3Ny5naXRodWIuaW8vaGRfZm5hZi8xLw=='),'FNAF 1')">&#x1F3AE; FNAF 1</div>
    <div class="app" data-name="FNAF 2" onclick="openGame(atob('aHR0cHM6Ly9pcnY3Ny5naXRodWIuaW8vaGRfZm5hZi8yLw=='),'FNAF 2')">&#x1F3AE; FNAF 2</div>
    <div class="app" data-name="FNAF 3" onclick="openGame(atob('aHR0cHM6Ly9pcnY3Ny5naXRodWIuaW8vaGRfZm5hZi8zLw=='),'FNAF 3')">&#x1F3AE; FNAF 3</div>
    <div class="app" data-name="FNAF 4" onclick="openGame(atob('aHR0cHM6Ly9pcnY3Ny5naXRodWIuaW8vaGRfZm5hZi80Lw=='),'FNAF 4')">&#x1F3AE; FNAF 4</div>
    <div class="app" data-name="Minecraft" onclick="openGame(atob('aHR0cHM6Ly9mcmVlc2gxMS5naXRodWIuaW8vR2FtZXMvRWFnbGVyY3JhZnRYXzEuOF9XQVNNLUdDX09mZmxpbmVfRG93bmxvYWQuaHRtbA=='),'MC')">&#x26CF; Minecraft</div>
    <div class="app" data-name="FNAE" onclick="openGame(atob('aHR0cHM6Ly9mcmVlc2gxMS5naXRodWIuaW8vR2FtZXMvZm5hZS5odG1s'),'FNAE')">&#x1F3AE; FNAE</div>
    <div class="app" data-name="NZP" onclick="openGame(atob('aHR0cHM6Ly9uenAuZ2F5Lw=='),'NZP')">&#x1F3AE; NZP</div>
    <div class="app" data-name="Task Manager" onclick="openTaskManager()">&#x1F4CA; Task Manager</div>
    <div class="app" data-name="Notepad" onclick="openNotepad()">&#x1F4DD; Notepad</div>
    <div class="app" data-name="CMD Command Prompt" onclick="openCMD()">&#x2328; CMD</div>
    <div class="app" data-name="Settings" onclick="openSettings()">&#x2699; Settings</div>
  </div>
  <div id="noResults" style="display:none;opacity:.4;font-size:13px;text-align:center;padding:20px 0;">No results found</div>
  <div class="startBottom">
    <div class="userBox">&#x1F464; User</div>
    <div class="powerBox" title="Power" onclick="showToast('Goodbye!','warn','&#x23FB;',500);setTimeout(()=>document.body.style.opacity='0',600)">&#x23FB;</div>
  </div>
</div>

<!-- TASKBAR -->
<div id="taskbar">
  <div id="taskIcons">
    <div class="taskBtn taskBtn--start" onclick="toggleStart()" title="Start (Win)">&#x1FA9F;</div>
  </div>
  <div id="taskRight">
    <div class="tray-icon" title="Network 🌐">🌐</div>
    <div class="tray-icon" id="volIcon" title="Volume" onclick="cycleVolume()">🔊</div>
    <div id="taskClock">
      <div id="clockTime">12:00</div>
      <div id="clockDate">Mon 4/17</div>
    </div>
    <div id="showDesktop" title="Show Desktop (Win+D)" onclick="showDesktop()"></div>
  </div>
</div>

<!-- DESKTOP CONTEXT MENU -->
<div id="menu">
  <div onclick="toggleStart()">&#x1FA9F; Start</div>
  <div onclick="openTaskManager()">&#x1F4CA; Task Manager</div>
  <div onclick="openNotepad()">&#x1F4DD; Notepad</div>
  <div onclick="openCMD()">&#x2328; Command Prompt</div>
  <div onclick="openSettings()">&#x2699; Settings</div>
  <hr>
  <div onclick="showDesktop()">&#x1F5A5; Show Desktop</div>
</div>

<!-- TASKBAR BUTTON CONTEXT MENU -->
<div id="tbMenu">
  <div id="tbMenuClose">&#x2716; Close window</div>
</div>

<script>
// === CLOAKING ===
(function(){
  try{
    document.title='\u200B';
    Object.defineProperty(document,'title',{get:()=>'\u200B',set:()=>{},configurable:true});
  }catch(e){}
})();

let z=10;
let windows=[];
let processes=[];
let procNextId=1;
let settingsProcId=null, cmdProcId=null;
let _tbMenuTarget=null;

function allocProc(o){return Object.assign({id:procNextId++,win:null,name:'App',mem:100,cpu:10},o);}

// ===================== CLOCK =====================
function updateClock(){
  const now=new Date();
  let h=now.getHours(), m=now.getMinutes();
  const ampm=h>=12?'PM':'AM';
  h=h%12||12;
  document.getElementById('clockTime').textContent=`${h}:${String(m).padStart(2,'0')} ${ampm}`;
  const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('clockDate').textContent=`${days[now.getDay()]} ${months[now.getMonth()]} ${now.getDate()}`;
}
updateClock();
setInterval(updateClock,10000);

// ===================== TOAST =====================
function showToast(title, type='info', icon='', duration=3200){
  const c=document.getElementById('toastContainer');
  const t=document.createElement('div');
  t.className=`toast ${type}`;
  const iconMap={info:'ℹ️',success:'✅',warn:'⚠️',error:'❌'};
  t.innerHTML=`<span class="toast-icon">${icon||iconMap[type]||'ℹ️'}</span><div class="toast-body"><div class="toast-title">${title}</div></div>`;
  c.appendChild(t);
  const tid=setTimeout(()=>{
    t.classList.add('out');
    setTimeout(()=>t.remove(),250);
  },duration);
  t.addEventListener('click',()=>{clearTimeout(tid);t.classList.add('out');setTimeout(()=>t.remove(),250);});
}

// ===================== SETTINGS PERSISTENCE =====================
const SETTINGS_KEY='desktop_settings_v2';
function saveSettings(){
  try{
    const s={
      bg:document.body.style.backgroundImage||document.body.style.background||'',
      bgImg:document.body.style.backgroundImage||'',
      accent:getComputedStyle(document.documentElement).getPropertyValue('--accent').trim(),
      taskOpacity:getComputedStyle(document.documentElement).getPropertyValue('--task-opacity').trim(),
    };
    localStorage.setItem(SETTINGS_KEY,JSON.stringify(s));
  }catch(e){}
}
function loadSettings(){
  try{
    const raw=localStorage.getItem(SETTINGS_KEY);
    if(!raw)return;
    const s=JSON.parse(raw);
    if(s.bg){applyBackground(s.bg);}
    if(s.accent){document.documentElement.style.setProperty('--accent',s.accent);}
    if(s.taskOpacity){setTaskbarOpacity(parseFloat(s.taskOpacity));}
  }catch(e){}
}
function applyBackground(val){
  if(!val)return;
  const isGrad=val.includes('gradient')||val.startsWith('url(');
  if(isGrad){
    document.body.style.background='none';
    document.body.style.backgroundImage=val;
    document.body.style.backgroundSize='cover';
    document.body.style.backgroundRepeat='no-repeat';
    document.body.style.backgroundAttachment='fixed';
  } else {
    document.body.style.backgroundImage='';
    document.body.style.background=val;
  }
  saveSettings();
}
function setTaskbarOpacity(val){
  document.documentElement.style.setProperty('--task-opacity',val);
  document.getElementById('taskbar').style.background='rgba(255,255,255,'+val+')';
  saveSettings();
}

// ===================== KEYBOARD SHORTCUTS =====================
document.addEventListener('keydown',e=>{
  // Escape — close start menu
  if(e.key==='Escape'){ start.classList.remove('active'); return; }
  // Meta / Win key
  if(e.key==='Meta'||e.key==='OS'){ e.preventDefault(); toggleStart(); return; }
  // Ctrl+Esc — toggle start
  if(e.key==='Escape'&&e.ctrlKey){ toggleStart(); return; }
  // Ctrl+Shift+Esc — task manager
  if(e.key==='Escape'&&e.ctrlKey&&e.shiftKey){ openTaskManager(); return; }
  if(e.code==='Escape'&&e.ctrlKey&&e.shiftKey){ openTaskManager(); return; }
  // Ctrl+Shift+Esc alternative
  if(e.ctrlKey&&e.shiftKey&&e.key==='Escape'){ openTaskManager(); flashHint('Task Manager'); return; }
  // Win+D — show desktop (Meta handled above, use Ctrl+D as alias)
  if(e.ctrlKey&&e.key==='d'){ e.preventDefault(); showDesktop(); flashHint('Win+D — Show Desktop'); return; }
  // Ctrl+N — new notepad
  if(e.ctrlKey&&e.key==='n'&&!e.shiftKey){ e.preventDefault(); openNotepad(); flashHint('Ctrl+N — Notepad'); return; }
});

  } else {
    windows.forEach(w=>{if(w._wasVisible){w.style.display='flex';w._wasVisible=false;}});
    _desktopHidden=false;
  }
}

const start=document.getElementById('start');

function toggleStart(){

function bring(w){w.style.zIndex=++z;}

function createTask(win,icon){
  const b=document.createElement('div');
  b.className='taskBtn open';
  b.innerText=icon;
  b.onclick=()=>{
    if(win.style.display==='none'){win.style.display='flex';bring(win);b.classList.add('open');}
    else{win.style.display='none';b.classList.remove('open');}
  };
  // Right-click on taskbar button
  b.addEventListener('contextmenu',e=>{

    _tbMenuTarget=win;

    m.style.left=e.clientX+'px';

}

document.getElementById('tbMenuClose').onclick=()=>{

function createWindow(title,w=900,h=600){
  const win=document.createElement('div');
  win.className='window';
  // Center the window in the desktop area
  const vw=window.innerWidth, vh=window.innerHeight-60;
  const left=Math.max(20,Math.round((vw-w)/2));
  const top=Math.max(20,Math.round((vh-h)/2));
  win.style.cssText=`left:${left}px;top:${top}px;display:flex;z-index:${++z};width:${w}px;height:${h}px;`;
  win.innerHTML=`
    <div class='titlebar'>
      <span style="font-size:13px;">${title}</span>
      <div class='controls'>
        <span onclick='minWin(this)' title="Minimize">&#x2212;</span>
        <span class='win-fs' onclick='toggleMaximize(this)' title="Maximize">&#x25A1;</span>
        <span onclick='closeWBtn(this)' title="Close">&#x2716;</span>
      </div>
    </div>
    <div class='resizeHandle'></div>
  `;
  document.body.appendChild(win);
  drag(win);
  resize(win);
  // Click anywhere on window to bring to front
  win.addEventListener('mousedown',()=>bring(win),true);
  windows.push(win);
  return win;
}

function toggleMaximize(el){
  const win=el.closest('.window');
  if(!win) return;
  if(win.dataset.gameUrl){
    // Game: open in new tab
    const u=win.dataset.gameUrl;
    const t=window.open('about:blank','_blank');
    if(t){
      t.document.open();
      t.document.write('<!DOCTYPE html><html><head><title>\u200B</title><style>*{margin:0;padding:0;box-sizing:border-box}html,body{width:100%;height:100%;overflow:hidden;background:#000}iframe{width:100%;height:100%;border:none;display:block}</style></head><body><iframe src="'+u.replace(/"/g,'&quot;')+'" allowfullscreen></iframe></body></html>');
      t.document.close();
    } else alert('Pop-up blocked.');
    return;
  }
  _maximizeToggle(win);
}
// Keep legacy name for any existing calls
function toggleFullscreen(el){ toggleMaximize(el); }

function _maximizeToggle(win){
  if(win.classList.contains('maximized')){
    win.classList.remove('maximized');
    if(win._maxBackup){
      win.style.left=win._maxBackup.left;win.style.top=win._maxBackup.top;
      win.style.width=win._maxBackup.width;win.style.height=win._maxBackup.height;
    }
    const btn=win.querySelector('.win-fs'); if(btn) btn.textContent='◻';
  } else {
    win._maxBackup={left:win.style.left,top:win.style.top,width:win.style.width,height:win.style.height};
    win.classList.add('maximized');
    const btn=win.querySelector('.win-fs'); if(btn) btn.textContent='❐';
  }
  bring(win);
}

function finish(win,icon,p){
  win.task=createTask(win,icon);
  if(p) p.win=win;
}

function closeW(win){
  windows=windows.filter(x=>x!==win);
  const removedProc=processes.find(p=>p.win===win);
  if(removedProc){
    if(removedProc.id===settingsProcId) settingsProcId=null;
    if(removedProc.id===cmdProcId) cmdProcId=null;
  }
  processes=processes.filter(p=>p.win!==win);
  if(win.task) win.task.remove();
  if(win._tmCleanup) win._tmCleanup();
  win.remove();
}
function closeWBtn(e){ closeW(e.closest('.window')); }

function minWin(e){
  const win=e.closest('.window');
  win.style.display='none';
  if(win.task) win.task.classList.remove('open');
}

function openCMD(){
  const win=createWindow('Command Prompt');
  const p=allocProc({name:'Command Prompt',mem:+(20+Math.random()*10).toFixed(0),cpu:+(Math.random()*1).toFixed(1)});
  processes.push(p);p.win=win;cmdProcId=p.id;

  const body=document.createElement('div');body.className='cmdBody';
  let cwd='C:\\Users\\User';
  body.innerHTML='Command Prompt — type <b>help</b> for a list of commands.<br><br>';

  const inputRow=document.createElement('div');
  inputRow.style.cssText='display:flex;align-items:center;background:#000;border-top:1px solid rgba(255,255,255,0.06);flex-shrink:0;';
  const prompt=document.createElement('span');
  prompt.style.cssText='color:var(--accent);font-family:monospace;padding:5px 0 5px 5px;white-space:nowrap;font-size:13px;';
  prompt.textContent=cwd+'> ';
  const input=document.createElement('input');
  input.className='cmdInput';input.autocomplete='off';
  input.style.borderTop='none';
  inputRow.appendChild(prompt);inputRow.appendChild(input);

  let history=[];let histIdx=-1;

  function appendOut(rawCmd,outHtml){
    const esc=String(rawCmd).replace(/</g,'&lt;');
    const rich=String(outHtml).trim().startsWith('<');
    body.innerHTML+='<span style="opacity:.5">'+cwd+'&gt; </span>'+esc+'<br>'+(rich?outHtml:'<span style="opacity:.85">'+String(outHtml)+'</span>')+'<br><br>';
    body.scrollTop=body.scrollHeight;
  }

  input.onkeydown=(e)=>{
    if(e.key==='ArrowUp'){e.preventDefault();if(histIdx<history.length-1){histIdx++;input.value=history[history.length-1-histIdx];}return;}
    if(e.key==='ArrowDown'){e.preventDefault();if(histIdx>0){histIdx--;input.value=history[history.length-1-histIdx];}else{histIdx=-1;input.value='';}return;}
    if(e.key!=='Enter') return;
    const raw=input.value;const line=raw.trim();
    if(!line){input.value='';return;}
    history.push(raw);histIdx=-1;
    const parts=line.match(/(?:[^\s"]+|"[^"]*")+/g)||[];
    const cmd=(parts[0]||'').replace(/^"(.*)"$/,'$1').toLowerCase();
    const args=parts.slice(1).map(a=>a.replace(/^"(.*)"$/,'$1'));
    let o='';
    if(cmd==='help'){
      o='<div style="line-height:1.6;opacity:.95"><b>Basics</b><br><code>cls / clear</code> · <code>exit</code> · <code>ver</code> · <code>time</code> · <code>date</code><br><br><b>Files</b><br><code>cd [folder]</code> · <code>dir / ls</code> · <code>type [file]</code><br><br><b>System</b><br><code>systeminfo</code> · <code>sysinfo</code> · <code>mem</code> · <code>cpu</code> · <code>hostname</code> · <code>whoami</code><br><br><b>Network</b><br><code>ipconfig</code> · <code>ping [host]</code><br><br><b>Other</b><br><code>echo [text]</code> · <code>title [text]</code> · <code>color [hex]</code> · <code>history</code></div>';
    } else if(cmd==='cls'||cmd==='clear'){body.innerHTML='';input.value='';return;
    } else if(cmd==='ver'){o='Microsoft Windows [Version 11.0.26100.3915]<br>'+navigator.userAgent;
    } else if(cmd==='time'){o='Current time: '+new Date().toLocaleTimeString();
    } else if(cmd==='date'){o='Current date/time: '+new Date().toLocaleString();
    } else if(cmd==='hostname'){o='Host: '+(location.hostname||'DESKTOP-SIM');
    } else if(cmd==='whoami'){o='simulator\\'+(localStorage.getItem('sim_user')||'User');
    } else if(cmd==='cd'&&args[0]){cwd=args[0].replace(/\//g,'\\');prompt.textContent=cwd+'> ';o='';
    } else if(cmd==='cd'||cmd==='pwd'){o='Current folder: '+cwd;
    } else if(cmd==='dir'||cmd==='ls'){o=' Directory of '+cwd+'<br><br>&nbsp;&lt;DIR&gt;&nbsp; .<br>&nbsp;&lt;DIR&gt;&nbsp; ..<br>notes.txt&nbsp;&nbsp;&nbsp;games&nbsp;&nbsp;&nbsp;readme.md<br><br>3 File(s)';
    } else if(cmd==='echo'){o=args.length?args.join(' '):'ECHO is on.';
    } else if(cmd==='title'&&args.length){const tEl=win.querySelector('.titlebar span');if(tEl)tEl.textContent=args.join(' ');o='Title changed.';
    } else if(cmd==='color'){
      if(args[0]){document.documentElement.style.setProperty('--accent',args[0]);o='Accent color set to '+args[0]+'.';}
      else o='Usage: color #hexcode';
    } else if(cmd==='history'){o=history.slice(-20).map((h,i)=>(i+1)+'.  '+h).join('<br>');
    } else if(cmd==='sysinfo'){o='Screen: '+screen.width+' × '+screen.height+'<br>CPUs: '+(navigator.hardwareConcurrency||'?')+(navigator.deviceMemory?'<br>RAM: '+navigator.deviceMemory+' GB':'');
    } else if(cmd==='mem'){
      if(performance.memory){const u=(performance.memory.usedJSHeapSize/1048576).toFixed(1),t=(performance.memory.totalJSHeapSize/1048576).toFixed(1),l=(performance.memory.jsHeapSizeLimit/1048576).toFixed(0);o='In use: '+u+' MB<br>Allocated: '+t+' MB<br>Limit: ~'+l+' MB';}
      else o='Memory info not available in this browser.';
    } else if(cmd==='cpu'){o='Logical processors: '+(navigator.hardwareConcurrency||'?');
    } else if(cmd==='ipconfig'){o='Ethernet adapter:<br>&nbsp;IPv4 Address: 192.168.1.105<br>&nbsp;Subnet Mask: 255.255.255.0<br>&nbsp;Default Gateway: 192.168.1.1';
    } else if(cmd==='ping'&&args[0]){const h2=args[0];o='Pinging '+h2+'...<br>Reply: 1ms&nbsp; Reply: 2ms&nbsp; Reply: 1ms&nbsp; Reply: 2ms<br>Sent=4, Received=4, Lost=0 (0% loss)';
    } else if(cmd==='ping'){o='Usage: ping example.com';
    } else if(cmd==='systeminfo'){o='Host: '+(location.hostname||'DESKTOP-SIM')+'<br>OS: Windows 11 Pro 26100<br>Platform: '+(navigator.platform||'x64')+'<br>RAM: '+(navigator.deviceMemory?navigator.deviceMemory+' GB':'N/A')+'<br>CPUs: '+(navigator.hardwareConcurrency||'?')+'<br>Language: '+navigator.language;
    } else if(cmd==='notepad'){openNotepad(args.join(' '));o='Notepad opened.';
    } else if(cmd==='exit'){closeWBtn(win.querySelector('.controls span:last-child'));return;
    } else {o='"'+cmd+'" is not recognized as a command. Type <b>help</b>.';}
    if(o!=='') appendOut(raw,o);
    else body.innerHTML+='<span style="opacity:.5">'+cwd+'&gt; </span>'+raw.replace(/</g,'&lt;')+'<br>';
    body.scrollTop=body.scrollHeight;
    input.value='';
  };

  win.appendChild(body);win.appendChild(inputRow);
  finish(win,'⌨️',p);
  start.classList.remove('active');
  setTimeout(()=>input.focus(),50);
}

// ===================== TASK MANAGER =====================
async function buildTmSnapshot(){
  const cores=navigator.hardwareConcurrency;
  const dm=navigator.deviceMemory;
  let usage=0,quota=0;
  try{if(navigator.storage&&navigator.storage.estimate){const e=await navigator.storage.estimate();usage=e.usage||0;quota=e.quota||0;}}catch(e){}
  const mem=performance.memory;
  const conn=navigator.connection||navigator.mozConnection||navigator.webkitConnection;
  return{cores:cores||'—',dm,screen:screen.width+' × '+screen.height+' @ '+window.devicePixelRatio+'x',lang:navigator.language,platform:navigator.platform||'—',mem,storageUsage:usage,storageQuota:quota,conn};
}

function openTaskManager(){
  const win=createWindow('Task Manager',860,580);
  let snap=null,lastTickAt=performance.now(),cpuVal=8;
  let ramPctLive=performance.memory?(performance.memory.usedJSHeapSize/performance.memory.jsHeapSizeLimit)*100:25;
  const cpuHistory=Array(60).fill(cpuVal),ramHistory=Array(60).fill(ramPctLive);
  const diskHistory=Array(60).fill(0),netHistory=Array(60).fill(0);
  let diskVal=0,netVal=0;

  buildTmSnapshot().then(s=>{
    snap=s;
    const set=(id,t)=>{const el=document.getElementById(id);if(el)el.textContent=t;};
    const c=Number(s.cores)||4;
    set('tm-cpu-sub',c+' Cores, '+c+' Logical Processors');

    set('tm-disk-sub','NVMe WD PC SN740 SSD');
    let nsub='Realtek PCIe GbE Family Controller';
    if(s.conn){netVal=typeof s.conn.downlink==='number'?s.conn.downlink:0;const et=String(s.conn.effectiveType||'').toLowerCase();if(et==='wifi'||et==='4g'||et==='3g'||et==='2g')nsub='Intel(R) Wi-Fi 6E AX211 160MHz';}
    set('tm-net-sub',nsub);
  });

  function step(){
    const now=performance.now();const interval=800;
    const drift=Math.max(0,now-lastTickAt-interval);lastTickAt=now;
    const fromLag=Math.min(100,drift*1.1);
    cpuVal=Math.min(100,Math.max(0,cpuVal*0.82+fromLag*0.18+(Math.random()-0.5)*2));
    cpuHistory.push(+cpuVal.toFixed(1));cpuHistory.shift();
    if(performance.memory)ramPctLive=(performance.memory.usedJSHeapSize/performance.memory.jsHeapSizeLimit)*100;
    else ramPctLive=Math.min(100,Math.max(5,ramPctLive+(Math.random()-0.5)*3));
    ramHistory.push(+ramPctLive.toFixed(1));ramHistory.shift();
    if(snap&&snap.storageQuota>0)diskVal=(snap.storageUsage/snap.storageQuota)*100;
    else diskVal=Math.max(0,Math.min(100,diskVal+(Math.random()-0.5)*2));
    diskHistory.push(+diskVal.toFixed(1));diskHistory.shift();
    if(snap&&snap.conn&&typeof snap.conn.downlink==='number')netVal=snap.conn.downlink;
    else netVal=Math.max(0,netVal+(Math.random()-0.45)*0.4);
    netHistory.push(+netVal.toFixed(2));netHistory.shift();
    processes.forEach(p=>{p.cpu=Math.max(0,Math.min(99,p.cpu+(Math.random()-0.5)*3));p.mem=Math.max(20,Math.min(600,p.mem+(Math.random()-0.5)*5));});

          <div class="perf-sidebar-item" data-metric="ram"><div class="perf-sidebar-label">Memory</div><div class="perf-sidebar-value" id="sb-ram">0 GB</div><canvas class="perf-sidebar-mini" id="mini-ram" height="36"></canvas></div>
          <div class="perf-sidebar-item" data-metric="disk"><div class="perf-sidebar-label">Disk 0</div><div class="perf-sidebar-value" id="sb-disk">0%</div><canvas class="perf-sidebar-mini" id="mini-disk" height="36"></canvas></div>
          <div class="perf-sidebar-item" data-metric="net"><div class="perf-sidebar-label">Network</div><div class="perf-sidebar-value" id="sb-net">0 Mbps</div><canvas class="perf-sidebar-mini" id="mini-net" height="36"></canvas></div>
        </div>
        <div class="perf-content" id="perf-detail-cpu">
          <div class="perf-header"><div class="perf-title">CPU</div><div class="perf-subtitle" id="tm-cpu-sub">8 Cores</div></div>
          <div class="chart-wrap"><div class="chart-label"><span>% Utilization — 60 s</span><span id="cpu-peak-label">Peak: 0%</span></div><div style="position:relative;height:180px;"><canvas id="main-chart" style="width:100%;height:180px;"></canvas></div></div>
          <div class="perf-stats-row">

  win.appendChild(tm);

  tm.querySelectorAll('.tm-tab').forEach(tab=>{

    item.onclick=()=>{
      tm.querySelectorAll('.perf-sidebar-item').forEach(i=>i.classList.remove('active'));

      allDetails.forEach(m=>{const el=document.getElementById(`perf-detail-${m}`);if(el)el.style.display=m===item.dataset.metric?'flex':'none';});
    };
  });

  function drawSparkline(canvas,data,color,fill,dataMax){
    if(!canvas)return;
    const ctx=canvas.getContext('2d');const W=canvas.offsetWidth||canvas.parentElement.offsetWidth||170;const H=canvas.height;
    canvas.width=W;ctx.clearRect(0,0,W,H);
    const max=dataMax!=null?dataMax:100;const pts=data.slice(-30);
    ctx.beginPath();const denom=Math.max(pts.length-1,1);
    pts.forEach((v,i)=>{const x=(i/denom)*W;const y=H-(v/max)*H;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
    ctx.strokeStyle=color;ctx.lineWidth=1.5;ctx.stroke();
    if(fill){ctx.lineTo(W,H);ctx.lineTo(0,H);ctx.closePath();ctx.fillStyle=fill;ctx.fill();}
  }
  function drawMainChart(canvasId,data,color,fillColor,maxVal){
    const canvas=document.getElementById(canvasId);if(!canvas)return;
    const ctx=canvas.getContext('2d');const W=canvas.parentElement.offsetWidth||600;const H=180;
    canvas.width=W;canvas.height=H;ctx.clearRect(0,0,W,H);
    ctx.strokeStyle='rgba(255,255,255,0.05)';ctx.lineWidth=1;
    [25,50,75].forEach(pct=>{const y=H-(pct/(maxVal||100))*H;ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();ctx.fillStyle='rgba(255,255,255,0.2)';ctx.font='10px Segoe UI';ctx.fillText(pct+(maxVal?'':'%'),4,y-3);});
    ctx.beginPath();const dDenom=Math.max(data.length-1,1);
    data.forEach((v,i)=>{const x=(i/dDenom)*W;const y=H-(v/(maxVal||100))*H;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
    ctx.strokeStyle=color;ctx.lineWidth=2;ctx.stroke();
    ctx.lineTo(W,H);ctx.lineTo(0,H);ctx.closePath();ctx.fillStyle=fillColor;ctx.fill();
  }

  const COLORS={
    cpu:{line:'#00d4ff',fill:'rgba(0,212,255,0.12)',mini:'rgba(0,212,255,0.5)',miniFill:'rgba(0,212,255,0.2)'},
    ram:{line:'#a855f7',fill:'rgba(168,85,247,0.12)',mini:'rgba(168,85,247,0.6)',miniFill:'rgba(168,85,247,0.2)'},
    disk:{line:'#22c55e',fill:'rgba(34,197,94,0.12)',mini:'rgba(34,197,94,0.5)',miniFill:'rgba(34,197,94,0.2)'},

  };
  const startTime=Date.now();let loopId;
  function setText(id,val){const el=document.getElementById(id);if(el)el.textContent=val;}

  function update(){
    step();
    const cpu=cpuVal,disk=diskVal,net=netVal;
    let ramPct=ramPctLive;
    if(performance.memory)ramPct=(performance.memory.usedJSHeapSize/performance.memory.jsHeapSizeLimit)*100;

    setText('sb-cpu',cpu.toFixed(1)+'%');
    setText('sb-ram',usedRamGb.toFixed(1)+' / '+totalRamGb.toFixed(1)+' GB');
    setText('sb-disk',disk.toFixed(0)+'%');
    setText('sb-net',net.toFixed(1)+' Mbps');
    const netSparkMax=Math.max(10,...netHistory,1);
    drawSparkline(document.getElementById('mini-cpu'),cpuHistory,COLORS.cpu.mini,COLORS.cpu.miniFill);
    drawSparkline(document.getElementById('mini-ram'),ramHistory,COLORS.ram.mini,COLORS.ram.miniFill);
    drawSparkline(document.getElementById('mini-disk'),diskHistory,COLORS.disk.mini,COLORS.disk.miniFill);
    drawSparkline(document.getElementById('mini-net'),netHistory,COLORS.net.mini,COLORS.net.miniFill,netSparkMax);
    drawMainChart('main-chart',cpuHistory,COLORS.cpu.line,COLORS.cpu.fill,100);
    drawMainChart('ram-chart',ramHistory,COLORS.ram.line,COLORS.ram.fill,100);
    drawMainChart('disk-chart',diskHistory,COLORS.disk.line,COLORS.disk.fill,100);
    drawMainChart('net-chart',netHistory,COLORS.net.line,COLORS.net.fill,netSparkMax);
    setText('stat-cpu-util',cpu.toFixed(1)+'%');
    setText('stat-cpu-speed',(3.1+cpu/200).toFixed(2)+' GHz');
    setText('stat-proc-count',(processes.length+42).toString());
    setText('cpu-peak-label','Peak: '+Math.max(...cpuHistory).toFixed(1)+'%');
    const secs=Math.floor((Date.now()-startTime)/1000);
    const h=Math.floor(secs/3600),m=Math.floor((secs%3600)/60),s=secs%60;
    setText('stat-uptime',`${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`);
    setText('stat-ram-used',usedRamGb.toFixed(1)+' GB');
    setText('stat-ram-avail',availRamGb.toFixed(1)+' GB');
    setText('ram-peak-label','Peak: '+Math.max(...ramHistory).toFixed(1)+'%');
    setText('stat-ram-total',(usedRamGb+2.1).toFixed(1)+' GB');
    setText('stat-disk-val',disk.toFixed(0)+'%');
    setText('stat-disk-r',(8+disk*0.42).toFixed(1)+' MB/s');
    setText('stat-disk-w',(2+disk*0.28).toFixed(1)+' MB/s');
    setText('stat-net-s',(net*0.22).toFixed(1)+' Mbps');
    setText('stat-net-r',(net*0.78).toFixed(1)+' Mbps');
    if(snap&&snap.conn&&snap.conn.downlink!=null){const lk=Math.max(100,Math.round(snap.conn.downlink*100));setText('stat-net-link',lk+'/'+lk+' Mbps');}
    else setText('stat-net-link','1000/1000 Mbps');

    const tbody=document.getElementById('proc-tbody');
    if(tbody){
      const fakeProcs=[
        {name:'System',icon:'🖥',cpu:+(cpuVal*0.05).toFixed(1),mem:+(12+Math.random()*2).toFixed(0)},
        {name:'Explorer.exe',icon:'📁',cpu:+(cpuVal*0.02).toFixed(1),mem:+(55+Math.random()*5).toFixed(0)},
        {name:'Dwm.exe',icon:'🪟',cpu:+(cpuVal*0.03).toFixed(1),mem:+(80+Math.random()*5).toFixed(0)},
        {name:'Antimalware Service',icon:'🛡',cpu:+(cpuVal*0.04).toFixed(1),mem:+(120+Math.random()*10).toFixed(0)},
        {name:'svchost.exe',icon:'⚙',cpu:+(cpuVal*0.06).toFixed(1),mem:+(45+Math.random()*4).toFixed(0)},
        {name:'RuntimeBroker.exe',icon:'🔑',cpu:+(cpuVal*0.01).toFixed(1),mem:+(30+Math.random()*3).toFixed(0)},
        ...(settingsProcId===null?[{name:'Settings',icon:'⚙️',cpu:+(cpuVal*0.005).toFixed(1),mem:'18'}]:[]),
        ...(cmdProcId===null?[{name:'Command Prompt',icon:'⌨',cpu:+(cpuVal*0.002).toFixed(1),mem:'8'}]:[]),
        ...processes.map(p=>({name:p.name,icon:p.name==='Settings'?'⚙️':p.name==='Command Prompt'?'⌨':p.name==='Notepad'?'📝':'🎮',cpu:+p.cpu.toFixed(1),mem:+p.mem.toFixed(0),endId:p.id}))
      ];
      tbody.innerHTML=fakeProcs.map(p=>`
        <tr>
          <td><div class="proc-name"><span class="proc-icon">${p.icon}</span>${p.name}</div></td>
          <td><div style="font-size:12px;margin-bottom:3px;">${p.cpu}%</div><div class="mini-bar"><div class="mini-bar-fill" style="width:${Math.min(p.cpu,100)}%;background:${COLORS.cpu.line};"></div></div></td>
          <td><div style="font-size:12px;margin-bottom:3px;">${p.mem} MB</div><div class="mini-bar"><div class="mini-bar-fill" style="width:${Math.min(p.mem/8,100)}%;background:${COLORS.ram.mini};"></div></div></td>
          <td style="color:#22c55e;font-size:11px;">Running</td>
          <td>${p.endId!==undefined?`<button type="button" class="end-btn" data-end="${p.endId}">Stop</button>`:''}</td>
        </tr>
      `).join('');
      tbody.querySelectorAll('[data-end]').forEach(btn=>{
        btn.addEventListener('click',()=>endById(+btn.dataset.end));
      });
    }
    loopId=setTimeout(update,800);
  }
  update();
  win._tmCleanup=()=>clearTimeout(loopId);
}

function endById(id){
  const i=processes.findIndex(p=>p.id===id);if(i<0)return;
  const p=processes[i];
  if(p.id===settingsProcId)settingsProcId=null;
  if(p.id===cmdProcId)cmdProcId=null;
  if(p.win){if(p.win.task)p.win.task.remove();if(p.win._tmCleanup)p.win._tmCleanup();const wi=windows.indexOf(p.win);if(wi>=0)windows.splice(wi,1);p.win.remove();}
  processes.splice(i,1);
}

// ===================== DRAG + SNAP + DBLCLICK MAXIMIZE =====================
function drag(w){
  let dx=0,dy=0,d=false,snapShowing=false;
  const titlebar=w.querySelector('.titlebar');
  const overlay=document.getElementById('snapOverlay');

  titlebar.addEventListener('dblclick',e=>{
    if(e.target.closest('.controls')) return;
    _maximizeToggle(w);
  });

  w.addEventListener('mousedown',e=>{
    if(w.classList.contains('maximized')) return;
    if(e.target.tagName==='IFRAME'||e.target.closest('.controls')) return;
    if(!e.target.closest('.titlebar')) return;
    d=true;dx=e.clientX-w.offsetLeft;dy=e.clientY-w.offsetTop;bring(w);
  });
  document.addEventListener('mousemove',e=>{
    if(!d) return;
    w.style.left=(e.clientX-dx)+'px';
    w.style.top=(e.clientY-dy)+'px';
    // Snap overlay if dragged to top
    if(e.clientY<8){if(!snapShowing){overlay.classList.add('show');snapShowing=true;}}
    else{if(snapShowing){overlay.classList.remove('show');snapShowing=false;}}
  });
  document.addEventListener('mouseup',e=>{
    if(!d) return;
    d=false;
    if(snapShowing){overlay.classList.remove('show');snapShowing=false;_maximizeToggle(w);}
  });
}

// ===================== RESIZE =====================
function resize(w){
  const r=w.querySelector('.resizeHandle');
  r.onmousedown=(e)=>{
    if(w.classList.contains('maximized')) return;
    e.stopPropagation();
    document.onmousemove=ev=>{w.style.width=(ev.clientX-w.offsetLeft)+'px';w.style.height=(ev.clientY-w.offsetTop)+'px';};
    document.onmouseup=()=>{document.onmousemove=null;document.onmouseup=null;};
  };
}

// ===================== CONTEXT MENUS =====================
document.addEventListener('contextmenu',e=>{
  e.preventDefault();
  document.getElementById('tbMenu').style.display='none';
  const m=document.getElementById('menu');
  m.style.display='block';
  const mx=Math.min(e.clientX,window.innerWidth-200);
  const my=Math.min(e.clientY,window.innerHeight-180);
  m.style.left=mx+'px';m.style.top=my+'px';
});
document.addEventListener('click',e=>{
  document.getElementById('menu').style.display='none';
  document.getElementById('tbMenu').style.display='none';
  if(!e.target.closest('#start')&&!e.target.closest('.taskBtn')) start.classList.remove('active');
});

// ===================== BOOT =====================
loadSettings();
setTimeout(()=>{showToast('Desktop ready','success','🖥️',2500);},600);
</script>
